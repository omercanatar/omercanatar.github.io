<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benim İlk Sitem</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3c72, #2a5298, #6dd5ed);
        }

        .kutu {
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        h1 {
            margin-top: 0;
            font-size: 42px;
            color: #1f2937;
        }

        p {
            font-size: 22px;
            color: #4b5563;
            margin-bottom: 30px;
        }

        button {
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px 28px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #1d4ed8;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="kutu">
        <h1>Merhaba Gençlerrrr</h1>
        <p>Bu benim ilk internet sitem.</p>
        <button>Tıkla</button>
    </div>
</body>
</html>
